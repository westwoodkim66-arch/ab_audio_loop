<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 隱藏開發環境中無害的 WebSocket 連線錯誤提示
      window.addEventListener('error', (e) => {
        if (e.message && (e.message.includes('WebSocket') || e.message.includes('vite') || e.message.includes('ws'))) {
          e.stopImmediatePropagation();
        }
      });
      window.addEventListener('unhandledrejection', (e) => {
        if (e.reason && e.reason.toString().includes('WebSocket')) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      });
      
      // 直接把 Vite Error Overlay 的自定義元素藏起來
      const style = document.createElement('style');
      style.innerHTML = 'vite-error-overlay { display: none !important; }';
      document.head.appendChild(style);
    
async function shortenUrl(longUrl){
  const res = await fetch('https://tinyurl.com/api-create.php?url=' + encodeURIComponent(longUrl));
  return await res.text();
}
</script>
